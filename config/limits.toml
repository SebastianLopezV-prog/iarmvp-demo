# Per-portfolio euro-limits for IaR alerting (Task 3.4).
# Limits are set in EUR, per IaR variant (gross/spread), per limit type.
# `default` applies unless a portfolio-specific section overrides it.

# Calibrated to the demo's IaR scale so utilisation reads in a meaningful band (~50-70%),
# with rare amber/breach on volatile days, and the per-MTU limit line sits on the chart.
[default.gross]
per_mtu_eur = 450
rolling_window_eur = 1800
remaining_day_eur = 4000

[default.spread]
per_mtu_eur = 250
rolling_window_eur = 1000
remaining_day_eur = 2800

# Example portfolio override (keyed by portfolio name); extend as portfolios are added.
# [portfolio."NO2 Wind".gross]
# remaining_day_eur = 75000
