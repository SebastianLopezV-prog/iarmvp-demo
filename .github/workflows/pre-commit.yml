name: pre-commit

# Run all linting/checks defined in .pre-commit-config.yaml

on:
  push:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: "pip"
    - uses: pre-commit/action@v3.0.1
