# Keeps the hosted Streamlit Community Cloud demo from going to sleep.
# Streamlit free-tier apps sleep after a stretch of inactivity; a plain HTTP ping does not
# reliably count as activity (sleep is tracked by real app sessions), so this loads the app
# in a headless browser (which opens the websocket session) and clicks the wake button if the
# app is found asleep. Runs on GitHub's infrastructure - no local machine needed.
#
# NOTE: this org enforces SHA-pinning for Actions, so this workflow deliberately uses NO
# marketplace actions (no `uses:`) - it relies on the runner's built-in python3.
name: Keep demo awake

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (GitHub may delay scheduled runs by a few minutes)
  workflow_dispatch:         # allows a manual run from the Actions tab

concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright + Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium
      - name: Visit the app (resets inactivity / wakes it)
        env:
          APP_URL: "https://dashboardpy-tozjybvhqntptotgbyf2tx.streamlit.app/"
        run: |
          python3 - <<'PY'
          import os
          from playwright.sync_api import sync_playwright

          url = os.environ["APP_URL"]
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print(f"Loading {url}")
              page.goto(url, wait_until="domcontentloaded", timeout=120000)
              try:
                  page.get_by_text("get this app back up", exact=False).click(timeout=15000)
                  print("Wake button found and clicked.")
              except Exception:
                  print("No wake button (app was already awake).")
              page.wait_for_timeout(45000)
              print("Done.")
              browser.close()
          PY
